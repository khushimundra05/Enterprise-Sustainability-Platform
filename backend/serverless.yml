service: sustainhub-backend

provider:
  name: aws
  runtime: nodejs22.x
  region: ap-south-1

  deploymentBucket:
    name: sustainhub-serverless-deployments

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
          Resource: "*"
          # Note: Scan is intentionally removed — we use Query with userId partition key everywhere

  environment:
    EMISSIONS_TABLE: EmissionsTable
    ENERGY_TABLE: EnergyTable
    WATER_TABLE: WaterTable
    WASTE_TABLE: WasteTable
    SUPPLIERS_TABLE: SuppliersTable
    COMPLIANCE_TABLE: ComplianceTable
    GOALS_TABLE: GoalsTable
    TEAMS_TABLE: TeamsTable
    REPORTS_TABLE: ReportsTable
    CORS_ORIGIN: "*"
    OPENAI_API_KEY: "test"
    COGNITO_USER_POOL_ID: ${env:COGNITO_USER_POOL_ID, ""}
    COGNITO_CLIENT_ID: ${env:COGNITO_CLIENT_ID, ""}

# ─────────────────────────────────────────────
# Cognito authorizer — attach to every protected route
# ─────────────────────────────────────────────
# In production, API Gateway verifies the JWT and injects claims
# into event.requestContext.authorizer.claims automatically.
# serverless-offline skips verification locally (claims won't be set),
# so getUserId.ts falls back to manual JWT decode.

functions:
  health:
    handler: src/handlers/health.handler
    events:
      - http:
          path: health
          method: get
          cors: true
          # health is intentionally public — no authorizer

  # ── Emissions ──────────────────────────────
  getEmissions:
    handler: src/handlers/emissions.getEmissions
    events:
      - http:
          path: emissions
          method: get
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            authorizerId: !Ref CognitoAuthorizer

  createEmission:
    handler: src/handlers/emissions.createEmission
    events:
      - http:
          path: emissions
          method: post
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            authorizerId: !Ref CognitoAuthorizer

  deleteEmission:
    handler: src/handlers/emissions.deleteEmission

service: sustainhub-backend

provider:
  name: aws
  runtime: nodejs22.x
  region: ap-south-1

  deploymentBucket:
    name: sustainhub-serverless-deployments

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
          Resource: "arn:aws:dynamodb:ap-south-1:755631019410:table/*"

        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
          Resource: arn:aws:s3:::sustainhub-reports/*

        - Effect: Allow
          Action:
            - sns:Publish
          Resource: arn:aws:sns:ap-south-1:755631019410:sustainhub-alerts

  environment:
    EMISSIONS_TABLE: EmissionsTable
    ENERGY_TABLE: EnergyTable
    WATER_TABLE: WaterTable
    WASTE_TABLE: WasteTable
    SUPPLIERS_TABLE: SuppliersTable
    COMPLIANCE_TABLE: ComplianceTable
    GOALS_TABLE: GoalsTable
    TEAMS_TABLE: TeamsTable
    REPORTS_TABLE: ReportsTable
    ALERTS_TABLE: AlertsTable
    RECOMMENDATIONS_TABLE: RecommendationsTable
    CORS_ORIGIN: "*"
    OPENAI_API_KEY: ${env:OPENAI_API_KEY, ""}
    OPENAI_MODEL: ${env:OPENAI_MODEL, "gpt-4.1-mini"}
    ANOMALY_MODEL_URL: ${env:ANOMALY_MODEL_URL, ""}
    COGNITO_USER_POOL_ID: ap-south-1_BoZTplkeB
    COGNITO_CLIENT_ID: shrrsv0l5e490fdi3atps987t
    S3_BUCKET: sustainhub-reports
    SNS_TOPIC_ARN: arn:aws:sns:ap-south-1:755631019410:sustainhub-alerts

build:
  esbuild:
    bundle: true
    minify: false
    external:
      - pdfkit

functions:
  health:
    handler: src/handlers/health.handler
    events:
      - http:
          path: health
          method: get
          cors: true

  getEmissions:
